
spring.application.name=AccountancyApp


#Database configuration for SQL Server
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;encrypt=true;trustServerCertificate=true;databaseName=AccountancyApp
spring.datasource.username=sa
spring.datasource.password=Numbernine9
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


#JPA / HIBERNATE
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false


#Flyway  (handles all schema creation and migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true


#Srcuriy(JWT)
app.jwt.secret=CHANGE_THIS_TO_A_256BIT_RANDOM_SECRET_IN_PRODUCTION
app.jwt.expiration-ms=86400000

#file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/receipts

#Logging
logging.level.com.Accountancy=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO

